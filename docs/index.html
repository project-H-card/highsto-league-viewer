<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ハイストリーグ試合情報</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="container">
      <!-- タブボタン -->
      <div class="tab-buttons">
        <button id="league-button" class="tab-button active" onclick="switchTab('league')">リーグ</button>
        <button id="next-match-button" class="tab-button" onclick="switchTab('next-match')">次の試合</button>
        <button id="final-button" class="tab-button" onclick="switchTab('final')">決勝</button>
        <button id="stats-button" class="tab-button" onclick="switchTab('stats')">成績ページ</button>
        <button id="fullscreen-button" class="fullscreen-button" onclick="requestContainerFullscreen()">
          全画面表示
        </button>
      </div>

      <!-- タブ内容 -->
      <div class="tab-content active" id="league-content">
        <div id="league-section" class="section"></div>
      </div>

      <div class="tab-content" id="next-match-content">
        <div id="next-match-section" class="section"></div>
      </div>

      <div class="tab-content" id="final-content">
        <div id="final-section" class="section"></div>
      </div>

      <div class="tab-content" id="stats-content">
        <div id="stats-section" class="section"></div>
      </div>
    </div>

    <div id="loading">
      <div id="loadingCircle"></div>
    </div>

    <script>
      const apiBaseUrl =
        'https://script.google.com/macros/s/AKfycbysyZVQ3UMOgMwxFBaWgVKRQts3PJpTx6aHPfHpFAevPvPB6O_fo1BC8r-XgBCAIR8U/exec';

      function fetchData(action) {
        const loading = document.getElementById('loading');
        loading.style.display = 'flex';

        const url = new URL(apiBaseUrl);
        url.searchParams.append('action', action);

        return fetch(url)
          .then((response) => response.json())
          .finally(() => {
            loading.style.display = 'none';
          });
      }

      function updateRootFontSize() {
        const container = document.querySelector('.container');
        if (!container) return;

        const base = Math.min(container.clientWidth / 76, container.clientHeight / 42);
        const fontSize = Math.max(15, Math.min(base, 38));
        document.documentElement.style.fontSize = `${fontSize}px`;
      }

      function updateFullscreenButtonLabel() {
        const button = document.getElementById('fullscreen-button');
        if (!button) return;
        button.textContent = document.fullscreenElement ? '全画面解除' : '全画面表示';
      }

      async function requestContainerFullscreen() {
        const container = document.querySelector('.container');
        if (!container) return;

        try {
          if (!document.fullscreenElement) {
            if (container.requestFullscreen) {
              await container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
              container.webkitRequestFullscreen();
            }
          } else if (document.exitFullscreen) {
            await document.exitFullscreen();
          }
        } catch (error) {
          console.error('全画面化に失敗しました', error);
        } finally {
          updateRootFontSize();
          updateFullscreenButtonLabel();
        }
      }

      // タブを切り替える関数
      function switchTab(tab) {
        document.querySelectorAll('.tab-buttons .tab-button').forEach((button) => button.classList.remove('active'));
        document.getElementById(`${tab}-button`).classList.add('active');
        document.querySelectorAll('.tab-content').forEach((content) => content.classList.remove('active'));
        document.getElementById(`${tab}-content`).classList.add('active');

        if (tab === 'league') fetchData('getLeagues').then(displayLeagues);
        if (tab === 'next-match') fetchData('getNextMatches').then(displayNextMatches);
        if (tab === 'final') fetchData('getFinalTournament').then(displayFinalTournament);
        if (tab === 'stats') fetchData('getLeagues').then(displayStats);
      }

      function displayLeagues(leagues) {
        const section = document.getElementById('league-section');
        section.innerHTML = '';

        leagues.forEach((league) => {
          section.appendChild(createLeagueTeamListColumn(league));
        });
      }

      function createLeagueTeamListColumn(league) {
        const column = document.createElement('div');
        column.className = 'column team-list-column';

        column.appendChild(createTitle(`${league.league}リーグ`));
        column.appendChild(createLeagueTeamList(league.teams));

        return column;
      }

      function createLeagueTeamList(teams) {
        const list = document.createElement('ol');
        list.className = 'team-list';

        teams.forEach((team) => {
          const li = document.createElement('li');
          li.textContent = team.teamId;
          list.appendChild(li);
        });

        return list;
      }

      function createTitle(text) {
        const h2 = document.createElement('h2');
        h2.textContent = text;
        return h2;
      }

      function createLeagueTable(teams) {
        const table = document.createElement('table');
        table.appendChild(createTableHeader());
        table.appendChild(createTableBody(teams));
        return table;
      }

      function createTableHeader() {
        const thead = document.createElement('thead');
        thead.innerHTML = `
    <tr>
      <th>順位</th>
      <th>チーム</th>
      <th>総合</th>
      <th>予選</th>
      <th>勝ち数</th>
    </tr>
  `;
        return thead;
      }

      function createTableBody(teams) {
        const tbody = document.createElement('tbody');

        teams.forEach((team, index) => {
          const row = document.createElement('tr');

          row.appendChild(createCell(index + 1));
          row.appendChild(createCell(team.teamId));
          row.appendChild(createCell(team.totalPoint));
          row.appendChild(createCell(team.prelimPoint));
          row.appendChild(createCell(team.wins));

          tbody.appendChild(row);
        });

        return tbody;
      }

      function createCell(value) {
        const td = document.createElement('td');
        td.textContent = value ?? '';
        return td;
      }

      function displayStats(leagues) {
        const section = document.getElementById('stats-section');
        section.innerHTML = '';

        leagues.forEach((league) => {
          section.appendChild(createStatsColumn(league));
        });
      }

      function createStatsColumn(league) {
        const column = document.createElement('div');
        column.className = 'column';

        column.appendChild(createTitle(`${league.league}リーグ`));
        column.appendChild(createLeagueTable(league.teams));

        return column;
      }

      function displayNextMatches(data) {
        const section = document.getElementById('next-match-section');
        section.innerHTML = '';

        const leagues = {};
        data.forEach((m) => {
          if (!leagues[m.league]) leagues[m.league] = [];
          leagues[m.league].push(m);
        });
        let tableNumber = 1;

        Object.keys(leagues).forEach((lg) => {
          const col = document.createElement('div');
          col.classList.add('column');

          const title = document.createElement('h2');
          title.textContent = `${lg}リーグ 次の試合`;
          col.appendChild(title);

          const table = document.createElement('table');

          leagues[lg].forEach((m) => {
            table.innerHTML += `
        <tr>
          <th>${tableNumber}</th>
                <td>${m.team1Id}</td>
                <td>vs</td>
                <td>${m.team2Id}</td>
              </tr>
            `;
            tableNumber++;
          });

          col.appendChild(table);
          section.appendChild(col);
        });
      }

      function displayFinalTournament(data) {
        const section = document.getElementById('final-section');
        section.innerHTML = '';

        data.forEach((match) => {
          const col = document.createElement('div');
          col.classList.add('column');

          const title = document.createElement('h2');
          title.textContent = match.matchType;
          col.appendChild(title);

          const table = document.createElement('table');
          table.innerHTML += `
      <tr>
              <td>${match.team1Id}</td>
              <td>vs</td>
              <td>${match.team2Id}</td>
            </tr>
          `;

          if (match.winnerId) {
            table.innerHTML += `
              <tr>
                <th colspan="3">勝者：${match.winnerId}</th>
              </tr>
            `;
          }

          col.appendChild(table);
          section.appendChild(col);
        });
      }

      // 初期データの取得と表示
      window.onload = function () {
        updateRootFontSize();
        updateFullscreenButtonLabel();
        window.addEventListener('resize', updateRootFontSize);
        document.addEventListener('fullscreenchange', () => {
          updateRootFontSize();
          updateFullscreenButtonLabel();
        });
        switchTab('league'); // 最初に表示するタブ
      };
    </script>
  </body>
</html>
